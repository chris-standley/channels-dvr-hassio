name: Update base image

# Watches each app's upstream image tag and, when the image digest changes,
# pins the new digest in that app's Dockerfile and bumps its version so Home
# Assistant offers an update. Runs daily and can be triggered manually.
#
# Note: this tracks the *base image* (ffmpeg / OS / GPU libs). For Channels DVR
# the server self-updates at runtime; for Jellyfin the image update *is* the
# server update.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC (GitHub may delay scheduled runs)
  workflow_dispatch: {} # allow manual "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pin new digests and bump versions
        id: bump
        run: |
          set -euo pipefail

          # app dir -> upstream image reference (registry/repo:tag)
          declare -A IMAGES=(
            ["channels_dvr"]="fancybits/channels-dvr:latest"
            ["channels_dvr_nvidia"]="fancybits/channels-dvr:nvidia"
            ["jellyfin"]="ghcr.io/jellyfin/jellyfin:latest"
            ["jellyfin_nvidia"]="ghcr.io/jellyfin/jellyfin:latest"
          )

          # Resolve the manifest (list) digest for an image ref, on Docker Hub
          # or ghcr.io. Echoes e.g. "sha256:...".
          get_digest() {
            local image="$1" tag repo_part repo token api
            tag="${image##*:}"
            repo_part="${image%:*}"
            if [[ "$repo_part" == ghcr.io/* ]]; then
              repo="${repo_part#ghcr.io/}"
              token=$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r .token)
              api="https://ghcr.io"
            else
              repo="$repo_part"
              token=$(curl -fsSL "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${repo}:pull" | jq -r .token)
              api="https://registry-1.docker.io"
            fi
            curl -fsSL -o /dev/null -D - \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
              "${api}/v2/${repo}/manifests/${tag}" \
              | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:"{print $2}'
          }

          changed=0

          for dir in "${!IMAGES[@]}"; do
            image="${IMAGES[$dir]}"
            repo_ref="${image%:*}"          # registry/repo without the tag
            tag="${image##*:}"
            new="$(get_digest "$image")"
            if [ -z "$new" ]; then
              echo "::error::Could not resolve digest for ${image}"
              exit 1
            fi

            cur="$(grep -oE '@sha256:[0-9a-f]+' "$dir/Dockerfile" | head -n1 || true)"
            if [ "$cur" = "@${new}" ]; then
              echo "$dir: up to date (${new})"
              continue
            fi

            echo "$dir: ${cur:-<none>} -> @${new}"
            sed -i -E "s|^ARG BUILD_FROM=.*|ARG BUILD_FROM=${repo_ref}@${new}|" "$dir/Dockerfile"

            oldv="$(grep -oE '^version:[[:space:]]*"?[0-9]+\.[0-9]+\.[0-9]+' "$dir/config.yaml" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
            IFS=. read -r a b c <<< "$oldv"
            newv="${a}.${b}.$((c + 1))"
            sed -i -E "s|^version:.*|version: \"${newv}\"|" "$dir/config.yaml"
            echo "$dir: version ${oldv} -> ${newv}"

            # Prepend a changelog entry so Home Assistant shows a note on the update.
            changelog="$dir/CHANGELOG.md"
            [ -f "$changelog" ] || printf '# Changelog\n' > "$changelog"
            {
              echo "# Changelog"
              echo
              echo "## ${newv} — $(date -u +%Y-%m-%d)"
              echo
              echo "- Updated the base image to a new upstream build (tracks the \`${tag}\` tag)."
              echo "  This refreshes the bundled runtime (ffmpeg / OS / GPU libraries)."
              echo "  Pinned digest: \`${new}\`"
              echo
              tail -n +2 "$changelog"
            } > "${changelog}.tmp"
            mv "${changelog}.tmp" "$changelog"

            changed=1
          done

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.bump.outputs.changed == '1'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update base image digests and bump app versions"
          git push
