name: Update base image

# Watches the upstream fancybits/channels-dvr tags and, when the image digest
# changes, pins the new digest in the Dockerfile and bumps the add-on version
# so Home Assistant offers an update. Runs daily and can be triggered manually.
#
# Note: this only tracks the *base image* (ffmpeg/OS/GPU libs), which changes
# infrequently — the Channels server itself self-updates at runtime.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC (GitHub may delay scheduled runs)
  workflow_dispatch: {} # allow manual "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pin new digests and bump versions
        run: |
          set -euo pipefail

          REPO="fancybits/channels-dvr"

          # dir -> upstream tag it tracks
          declare -A TAGS=(
            ["channels_dvr"]="latest"
            ["channels_dvr_nvidia"]="nvidia"
          )

          get_digest() {
            local tag="$1" token
            token=$(curl -fsSL "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${REPO}:pull" | jq -r .token)
            curl -fsSL -o /dev/null -D - \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
              "https://registry-1.docker.io/v2/${REPO}/manifests/${tag}" \
              | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:"{print $2}'
          }

          changed=0

          for dir in "${!TAGS[@]}"; do
            tag="${TAGS[$dir]}"
            new="$(get_digest "$tag")"
            if [ -z "$new" ]; then
              echo "::error::Could not resolve digest for ${REPO}:${tag}"
              exit 1
            fi

            cur="$(grep -oE '@sha256:[0-9a-f]+' "$dir/Dockerfile" | head -n1 || true)"
            if [ "$cur" = "@${new}" ]; then
              echo "$dir: up to date (${new})"
              continue
            fi

            echo "$dir: ${cur:-<none>} -> @${new}"
            sed -i -E "s|^ARG BUILD_FROM=.*|ARG BUILD_FROM=${REPO}@${new}|" "$dir/Dockerfile"

            oldv="$(grep -oE '^version:[[:space:]]*"?[0-9]+\.[0-9]+\.[0-9]+' "$dir/config.yaml" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
            IFS=. read -r a b c <<< "$oldv"
            newv="${a}.${b}.$((c + 1))"
            sed -i -E "s|^version:.*|version: \"${newv}\"|" "$dir/config.yaml"
            echo "$dir: version ${oldv} -> ${newv}"

            changed=1
          done

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
        id: bump

      - name: Commit and push
        if: steps.bump.outputs.changed == '1'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update Channels DVR base image digest and bump version"
          git push
