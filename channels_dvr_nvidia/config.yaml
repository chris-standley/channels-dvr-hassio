# Home Assistant add-on configuration for Channels DVR Server (NVIDIA / NVENC)
# Docs: https://developers.home-assistant.io/docs/add-ons/configuration
name: Channels DVR (NVIDIA)
version: "1.0.0"
slug: channels_dvr_nvidia
description: >-
  Channels DVR Server with NVIDIA NVENC hardware transcoding. Requires a Home
  Assistant host with NVIDIA drivers and GPU device access (see docs). For Intel
  or AMD GPUs, use the "Channels DVR (Intel / AMD)" add-on instead.
url: https://getchannels.com/dvr-server/
# NVIDIA NVENC is only meaningful on amd64 hosts with an NVIDIA GPU.
arch:
  - amd64

# The upstream fancybits/channels-dvr:nvidia image ships its own entrypoint.
init: false
startup: application
boot: auto

# Host networking for HDHomeRun tuner discovery (SSDP/Bonjour) and DLNA.
host_network: true

ports:
  8089/tcp: 8089
ports_description:
  8089/tcp: Web interface and API

webui: "http://[HOST]:8089"
panel_icon: mdi:television-classic

# Storage (identical layout to the Intel/AMD add-on, but a SEPARATE config dir):
#   - config/database  -> this add-on's own config dir  (/channels-dvr)
#   - recordings       -> Home Assistant's /media share (/shares/DVR)
map:
  - type: addon_config
    read_only: false
    path: /channels-dvr
  - type: media
    read_only: false
    path: /shares/DVR

# NVIDIA GPU device nodes. These must exist on the host (created by the NVIDIA
# kernel driver). If your GPU is not index 0, or the driver exposes different
# nodes, adjust this list. The add-on will fail to start if a listed device is
# missing — see DOCS.md for the full host requirements.
devices:
  - /dev/nvidia0
  - /dev/nvidiactl
  - /dev/nvidia-uvm
  - /dev/nvidia-uvm-tools
  - /dev/nvidia-modeset
